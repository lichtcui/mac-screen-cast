[package]
name = "screenstream"
version = "0.1.0"
edition = "2021"

[dependencies]
tiny_http = "0.12"
ctrlc = "3.4"
core-graphics = "0.25"
core-foundation = "0.10"
foreign-types = "0.5"
arc-swap = "1"
bytes = "1"
serde_json = "1"
tokio = { version = "1", features = ["rt", "sync", "macros", "time"] }
rustrtc = "0.3"
rustls = { version = "0.23", features = ["ring"] }
screencapturekit = "8"

[profile.release]
opt-level = 3
lto = true
strip = true
