[package]
name = "mac-screen-cast"
version = "0.1.0"
edition = "2021"

[dependencies]
tiny_http = "0.12"
ctrlc = "3.4"
bytes = "1"
serde_json = "1"
tokio = { version = "1", features = ["rt", "sync", "macros", "time"] }
rustrtc = "0.3"
rustls = { version = "0.23", features = ["ring"] }
screencapturekit = "8"
videotoolbox = "0.18"
apple-cf = { version = "0.9", default-features = false, features = ["iosurface"] }

[profile.release]
opt-level = 3
lto = true
strip = true
